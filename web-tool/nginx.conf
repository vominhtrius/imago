server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy imago HTTP API so the browser hits the same origin.
    # Using a variable defers DNS resolution to request time (via the docker
    # embedded resolver), so the container doesn't crash at startup if imago
    # isn't ready yet.
    #
    # `Cache-Control: no-store` + `hide_header` on upstream cache headers:
    # the web-tool exists for side-by-side timing comparison, so every
    # submit must actually hit the service. Without this, imgproxy's
    # `Cache-Control: no-cache` still allows disk-cache round-trips that
    # skew the "Total" number towards zero on repeat runs.
    location /api/imago/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $imago_host "imago";
        rewrite ^/api/imago/(.*)$ /$1 break;
        proxy_pass         http://$imago_host:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;

        proxy_hide_header  Cache-Control;
        proxy_hide_header  ETag;
        proxy_hide_header  Last-Modified;
        proxy_hide_header  Expires;
        add_header         Cache-Control     "no-store, no-cache, must-revalidate" always;
        add_header         Pragma            "no-cache" always;
    }

    # Proxy imgproxy so the tool can hit both services from the same origin
    # and surface them side-by-side for comparison. imgproxy binds to :80 to
    # match the benchmark compose config.
    location /api/imgproxy/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $imgproxy_host "imgproxy";
        rewrite ^/api/imgproxy/(.*)$ /$1 break;
        proxy_pass         http://$imgproxy_host:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;

        proxy_hide_header  Cache-Control;
        proxy_hide_header  ETag;
        proxy_hide_header  Last-Modified;
        proxy_hide_header  Expires;
        add_header         Cache-Control     "no-store, no-cache, must-revalidate" always;
        add_header         Pragma            "no-cache" always;
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}
