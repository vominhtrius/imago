server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy imago HTTP API so the browser hits the same origin.
    # Using a variable defers DNS resolution to request time (via the docker
    # embedded resolver), so the container doesn't crash at startup if imago
    # isn't ready yet.
    location /api/imago/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $imago_host "imago";
        rewrite ^/api/imago/(.*)$ /$1 break;
        proxy_pass         http://$imago_host:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy imgproxy so the tool can hit both services from the same origin
    # and surface them side-by-side for comparison.
    location /api/imgproxy/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $imgproxy_host "imgproxy";
        rewrite ^/api/imgproxy/(.*)$ /$1 break;
        proxy_pass         http://$imgproxy_host:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}
