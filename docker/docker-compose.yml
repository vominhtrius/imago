services:

  imago:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_TYPE: Release
        APT_MIRROR: ${APT_MIRROR:-http://ports.ubuntu.com/ubuntu-ports}
    cpus: "4"
    mem_limit: 4g
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_FORCE_PATH_STYLE=true
      - THREAD_POOL_SIZE=4
      - DROGON_WORKERS=4
      - IMAGO_PORT=8080
      - AWS_EC2_METADATA_DISABLED=true
    depends_on:
      - minio

  imago-debug:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_TYPE: Debug
    cpus: "2"
    mem_limit: 2g
    ports:
      - "8081:8080"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_FORCE_PATH_STYLE=true
      - THREAD_POOL_SIZE=2
      - DROGON_WORKERS=2
      - IMAGO_PORT=8080
      - AWS_EC2_METADATA_DISABLED=true
      - ASAN_OPTIONS=detect_leaks=1:suppressions=/app/asan/suppressions.supp:log_path=/tmp/asan.log
    volumes:
      - ./asan-output:/tmp
    depends_on:
      - minio

  imgproxy:
    image: darthsim/imgproxy:latest
    cpus: "4"
    mem_limit: 4g
    ports:
      - "8082:8080"
    environment:
      - IMGPROXY_MAX_CLIENTS=100
      - IMGPROXY_CONCURRENCY=4
      - IMGPROXY_CACHE_SIZE=0
      - IMGPROXY_SO_REUSEPORT=true
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - IMGPROXY_USE_S3=true
      - IMGPROXY_S3_ENDPOINT=http://minio:9000
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data

  # React playground for the imago API.
  # Run with: docker compose --profile web up -d web-tool
  # Then open http://localhost:${WEB_TOOL_PORT:-5173}
  # nginx inside the container reverse-proxies /api/imago -> imago:8080
  # over the compose network, so the browser only sees a single origin.
  # The S3 SDK in the browser talks directly to MinIO on 9000.
  web-tool:
    build:
      context: ../web-tool
      dockerfile: Dockerfile
    profiles: [web]
    ports:
      - "${WEB_TOOL_PORT:-5173}:80"
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    depends_on:
      - imago

volumes:
  minio-data:
