services:

  imago:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_TYPE: Release
        APT_MIRROR: ${APT_MIRROR:-http://ports.ubuntu.com/ubuntu-ports}
    cpus: "4"
    mem_limit: 4g
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_FORCE_PATH_STYLE=true
      - THREAD_POOL_SIZE=4
      - DROGON_WORKERS=4
      - IMAGO_PORT=8080
      - AWS_EC2_METADATA_DISABLED=true
      # jemalloc: cap arenas to worker count (default 4×ncpu spawns 50+
      # per-thread arenas that pin dirty pages and balloon RSS without
      # actually leaking). Aggressive decay returns pages to the OS quickly.
      - MALLOC_CONF=narenas:4,background_thread:true,dirty_decay_ms:1000,muzzy_decay_ms:0,stats_print:true
    depends_on:
      - minio

  # ASan-instrumented build — opt-in via `--profile debug` so day-to-day
  # `docker compose up` doesn't pay the second compile pass (which OOM-kills
  # cc1plus on 8 GB Docker Desktops when run alongside the Release build).
  imago-debug:
    profiles: [debug]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_TYPE: Debug
    cpus: "2"
    mem_limit: 2g
    ports:
      - "8081:8080"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_FORCE_PATH_STYLE=true
      - THREAD_POOL_SIZE=2
      - DROGON_WORKERS=2
      - IMAGO_PORT=8080
      - AWS_EC2_METADATA_DISABLED=true
      - ASAN_OPTIONS=detect_leaks=1:suppressions=/app/asan/suppressions.supp:log_path=/tmp/asan.log
    volumes:
      - ./asan-output:/tmp
    depends_on:
      - minio

  # Enabled by the `web` profile so the playground can call imago and imgproxy
  # side-by-side for comparison. Config mirrors benchmark/docker-compose.yml
  # for apples-to-apples behaviour, plus IMGPROXY_TTL=0 so the browser and any
  # intermediaries don't cache responses between runs.
  imgproxy:
    image: darthsim/imgproxy:latest
    profiles: [web, compare]
    ports:
      - "${IMGPROXY_PORT:-8082}:80"
    environment:
      IMGPROXY_BIND: ":80"
      IMGPROXY_CONCURRENCY: ${WORKERS:-4}
      IMGPROXY_MAX_SRC_RESOLUTION: "99"
      IMGPROXY_USE_S3: "1"
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      # Emit Cache-Control: max-age=0, public — prevents the browser from
      # serving stale imgproxy responses while imago re-processes on every
      # submit (would break side-by-side comparison).
      IMGPROXY_TTL: "0"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    depends_on:
      - minio
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data

  # React playground for the imago API.
  # Run with: docker compose --profile web up -d playground
  # Then open http://localhost:${PLAYGROUND_PORT:-5173}
  # nginx inside the container reverse-proxies /api/imago -> imago:8080
  # over the compose network, so the browser only sees a single origin.
  # The S3 SDK in the browser talks directly to MinIO on 9000.
  playground:
    build:
      context: ../playground
      dockerfile: Dockerfile
    profiles: [web]
    ports:
      - "${PLAYGROUND_PORT:-5173}:80"
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    depends_on:
      - imago
      - imgproxy

volumes:
  minio-data:
